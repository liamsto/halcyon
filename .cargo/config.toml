[build]
target = "riscv64imac-unknown-none-elf"

[unstable]
build-std = ["core", "alloc", "std", "panic_abort"]

[target.riscv64imac-unknown-none-elf]
rustflags = [
  "-C", "link-arg=-Tlinker.ld",
]


[target.'cfg(target_os = "none")']
runner = "qemu-system-riscv64 -machine virt -smp 4 -nographic -bios default -kernel"

[profile.release]
codegen-units = 1
lto = "fat"
